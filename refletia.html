<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Refletia — Bem-vindo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f0eb;
      font-family: 'Georgia', serif;
    }

    .container {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 600px;
    }

    .logo {
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: #3a3530;
      margin-bottom: 0.5rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #b89e87;
      margin: 1.5rem auto;
    }

    .tagline {
      font-size: 1.1rem;
      color: #7a6e65;
      font-style: italic;
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    .message {
      font-size: 1rem;
      color: #5a5248;
      line-height: 1.9;
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: #b0a499;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Refletia</div>
    <div class="divider"></div>
    <p class="tagline">Seja bem-vindo.</p>
    <p class="message">
      É um prazer ter você aqui.<br />
      Estamos felizes em recebê-lo e prontos para oferecer<br />
      a melhor experiência possível.
    </p>
    <div class="footer">&copy; 2026 Refletia</div>
  </div>
</body>
</html>
